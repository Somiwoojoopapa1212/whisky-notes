<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#ffffff"/>
  <defs>
    <clipPath id="gc">
      <path d="M210,90 L302,90 C340,120 352,185 352,250 C352,320 315,355 277,380 C285,395 315,405 317,410 L317,445 L195,445 L195,410 C197,405 227,395 235,380 C197,355 160,320 160,250 C160,185 172,120 210,90 Z"/>
