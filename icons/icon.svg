<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#2e1200"/>
    </linearGradient>
    <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="50%" stop-color="#c17f24"/>
      <stop offset="100%" stop-color="#7a3e05"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c842" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c17f24" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="gc">
      <path d="M206,82 L306,82 C346,115 358,182 356,252 C354,322 316,358 278,382 C286,398 318,408 320,414 L320,448 L192,448 L192,414 C194,408 226,398 234,382 C196,358 158,322 156,252 C154,182 166,115 206,82 Z"/>
    </clipPath>
    <filter id="ambGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Amber glow behind glass -->
  <ellipse cx="256" cy="280" rx="130" ry="110" fill="#c17f24" opacity="0.12" filter="url(#ambGlow)"/>

  <!-- Whisky liquid -->
  <rect x="100" y="200" width="330" height="280" clip-path="url(#gc)" fill="url(#wg)"/>

  <!-- Liquid surface shimmer -->
  <ellipse cx="256" cy="200" rx="92" ry="7" clip-path="url(#gc)" fill="#f8e070" opacity="0.85"/>

  <!-- Inner liquid glow (top) -->
  <rect x="100" y="195" width="330" height="50" clip-path="url(#gc)" fill="url(#glow)"/>

  <!-- Glass body (translucent) -->
  <path d="M206,82 L306,82 C346,115 358,182 356,252 C354,322 316,358 278,382 C286,398 318,408 320,414 L320,448 L192,448 L192,414 C194,408 226,398 234,382 C196,358 158,322 156,252 C154,182 166,115 206,82 Z"
    fill="rgba(255,220,150,0.04)"/>

  <!-- Glass highlight (left reflection) -->
  <path d="M212,98 C176,135 162,196 161,262" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="13" stroke-linecap="round"/>

  <!-- Glass highlight (right, subtle) -->
  <path d="M300,98 C334,135 348,196 349,262" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="7" stroke-linecap="round"/>

  <!-- Glass outline -->
  <path d="M206,82 L306,82 C346,115 358,182 356,252 C354,322 316,358 278,382 C286,398 318,408 320,414 L320,448 L192,448 L192,414 C194,408 226,398 234,382 C196,358 158,322 156,252 C154,182 166,115 206,82 Z"
    fill="none" stroke="rgba(200,155,70,0.75)" stroke-width="9" stroke-linejoin="round"/>

  <!-- Rim highlight -->
  <line x1="206" y1="82" x2="306" y2="82" stroke="rgba(255,230,120,0.7)" stroke-width="5" stroke-linecap="round"/>
</svg>
 
